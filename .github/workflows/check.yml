name: Flight price check

on:
  schedule:
    - cron: "7 * * * *"   # каждый час в :07
  workflow_dispatch:        # ручной запуск кнопкой

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run checker
        env:
          TP_TOKEN: ${{ secrets.TP_TOKEN }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python3 checker.py

      - name: Save alert state
        run: |
          if ! git diff --quiet state.json 2>/dev/null; then
            git config user.name "flight-bot"
            git config user.email "actions@github.com"
            git add state.json
            git commit -m "update alert state"
            git push
          fi
