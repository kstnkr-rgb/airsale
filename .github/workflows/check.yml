name: Flight price check

on:
  schedule:
    - cron: "*/10 * * * *"   # каждые 10 минут
  workflow_dispatch:        # ручной запуск кнопкой

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check KGD -> SSH (Шарм)
        env:
          TP_TOKEN: ${{ secrets.TP_TOKEN }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python3 checker.py

      - name: Check KGD <-> LED (Питер, туда-обратно на 3)
        if: always()
        env:
          TP_TOKEN: ${{ secrets.TP_TOKEN }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python3 checker_spb.py

      - name: Save alert state
        if: always()
        run: |
          if ! git diff --quiet state.json state_spb.json 2>/dev/null; then
            git config user.name "flight-bot"
            git config user.email "actions@github.com"
            git add state.json state_spb.json
            git commit -m "update alert state"
            git push
          fi
